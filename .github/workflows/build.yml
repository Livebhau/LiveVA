# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: Auto Build & Release Minecraft Mod

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Release create karne ke liye permissions
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' # Agar naya Minecraft hai toh isko '21' kar dein

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest"
          name: "Latest Development Build"
          body: "Yeh auto-generated release hai latest commit se."
          prerelease: true
          files: build/libs/*.jar # Gradle yahan jar file save karta hai