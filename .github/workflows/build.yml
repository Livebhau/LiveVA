# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: Auto Build & Release Minecraft Mod

# Yeh action tab trigger hoga jab aap main ya master branch me code push karenge
on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Release create/update karne ke liye permissions zaroori hain
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Agar aap newer Minecraft use kar rahe hain, toh '21' likhein

      - name: Build with Maven
        run: mvn clean package

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest" # Har push par "latest" tag update hoga
          name: "Latest Development Build"
          body: "Yeh auto-generated release hai latest commit se."
          prerelease: true
          files: target/*.jar # Maven yahan jar file banata hai